version: "3.9"

services:
  enterprise-api:
    build: .
    container_name: enterprise-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
  postgres:
    image: postgres:16
    container_name: enterprise-postgres
    restart: unless-stopped
    environment:
        POSTGRES_DB: enterprise_task_manager
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: