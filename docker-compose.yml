

services:
  enterprise-api-1:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
  enterprise-api-2:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
  enterprise-api-3:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
  postgres:
    image: postgres:16
    container_name: enterprise-postgres
    restart: unless-stopped
    environment:
        POSTGRES_DB: enterprise_task_manager
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
  nginx:
    image: nginx:alpine
    container_name: enterprise-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - enterprise-api-1
      - enterprise-api-2
      - enterprise-api-3
      

volumes:
  postgres_data: