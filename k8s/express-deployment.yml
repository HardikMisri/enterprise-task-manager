apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-api

spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-api
  template:
    metadata:
      labels:
        app: enterprise-api
    spec:
      containers:
        - name: enterprise-api
          image: hardikmisri/enterprise-task-manager:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: DB_HOST

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: DB_PORT

            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: enterprise-secret
                  key: DB_PASSWORD

            - name: REDIS_HOSTNAME
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: REDIS_HOSTNAME

            - name: REDIS_PORT_NUMBER
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: REDIS_PORT_NUMBER

            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: enterprise-config
                  key: PORT
