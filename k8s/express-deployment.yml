apiVersion: apps/v1
kind: Deployment

metadata:
  name: enterprise-api

spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-api
  template:
    metadata:
      labels:
        app: enterprise-api
    spec:
      containers:
        - name: enterprise-api
          image: hardikmisri/enterprise-task-manager:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3000

          env:
            - name: DB_HOST
              value: postgres

            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: enterprise_task_manager
            - name: DB_USER
              value: postgres

            - name: DB_PASSWORD
              value: postgres

            - name: REDIS_HOSTNAME
              value: redis
            - name: REDIS_PORT_NUMBER
              value: "6379"
            - name: PORT
              value: "3000"
