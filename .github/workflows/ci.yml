name: Enterprise Task Manager CI

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      
      - name: Display Commit SHA
        run: echo "Commit SHA: ${{ github.sha }}"

      - name: Install Dependencies
        run: npm install

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-task-manager:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/enterprise-task-manager:${{ github.sha }} .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker Image
        run: |
           docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-task-manager:latest
           docker push ${{ seecrets.DOCKER_USERNAME }}/enterprise-task-manager:${{ github.sha }}

      - name: List Docker Images
        run: docker images
